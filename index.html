<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ভিডিও পোর্টাল - টেলিগ্রাম মিনি অ্যাপ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- টেলিগ্রাম ওয়েব অ্যাপ SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- এডসগ্রাম SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f2a 0%, #0b1128 100%);
            padding: 1rem;
            color: #eef2ff;
            min-height: 100vh;
        }

        .verify-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 12, 30, 0.96);
            backdrop-filter: blur(14px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .verify-card {
            background: linear-gradient(145deg, #111936, #0c122c);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 1px solid #6c8cff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 15px rgba(108, 140, 255, 0.3);
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .verify-card i {
            font-size: 4rem;
            color: #6c8cff;
            margin-bottom: 1rem;
        }

        .verify-card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #a5c1ff;
        }

        .verify-card p {
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        .verify-btn {
            background: #4f6fdf;
            border: none;
            padding: 1rem 2rem;
            border-radius: 3rem;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(79, 111, 223, 0.4);
        }

        .verify-btn:hover {
            transform: scale(1.02);
            background: #6a86ff;
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .main-content {
            display: none;
        }

        .main-content.visible {
            display: block;
        }

        .timer-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e67e22;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .loading-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 12, 35, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            z-index: 1002;
            text-align: center;
            font-weight: bold;
            border: 1px solid #6c8cff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .loading-notification i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #6c8cff;
            display: block;
        }

        .slider-section {
            margin-bottom: 2rem;
            background: rgba(79, 111, 223, 0.12);
            border-radius: 1.5rem;
            padding: 1rem 0.75rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 5px solid #6c8cff;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c7ddff;
        }

        .section-title i {
            color: #6c8cff;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 1.2rem;
            background: #0b112aaa;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-slide {
            flex: 0 0 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .thumb-video-card {
            background: #111936;
            border-radius: 1.2rem;
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            border: 1px solid #2a3a6a;
        }

        .thumb-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #080c1f;
            cursor: pointer;
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .play-overlay i {
            font-size: 3.5rem;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        .play-overlay:hover i {
            transform: scale(1.1);
            color: #6c8cff;
        }

        .thumb-wrapper:hover .thumb-img {
            transform: scale(1.02);
        }

        .card-info {
            padding: 1rem;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            word-break: break-word;
            line-height: 1.4;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 0.6rem 0.5rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: #2c3e66;
            color: white;
            border: 1px solid #5a7ac9;
        }

        .btn-watch {
            background: #4f6fdf;
            color: white;
            border: none;
        }

        .unlock-counter {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        .btn.locked {
            background: #3a405b;
            opacity: 0.85;
        }

        .btn.unlocked {
            background: #2ecc71;
            opacity: 1;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .dot {
            width: 30px;
            height: 4px;
            background: #4b5a8a;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .dot.active {
            background: #6c8cff;
            width: 40px;
        }

        .thumbnails-grid {
            margin-top: 1.5rem;
        }

        .grid-title {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
            border-left: 5px solid #6c8cff;
            padding-left: 1rem;
            color: #c7ddff;
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .video-card {
            background: #111936e6;
            border-radius: 1.2rem;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            border: 1px solid #2a3a6a;
        }

        .card-body {
            padding: 0.9rem 1rem 1rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        .professional-footer {
            margin-top: 2.5rem;
            background: #0c1230cc;
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            border-top: 1px solid #3a4b7a;
        }

        .copyright {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .footer-buttons {
            display: flex;
            gap: 0.8rem;
        }

        .footer-btn {
            background: none;
            border: none;
            color: #a5c1ff;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            padding: 0.3rem 0.6rem;
            border-radius: 1.5rem;
        }

        .footer-btn:hover {
            background: #4f6fdf30;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: #121a38e6;
            max-width: 400px;
            width: 100%;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid #6c8cff;
            color: #eef2ff;
        }

        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #a5c1ff;
        }

        .modal-content p {
            line-height: 1.5;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .close-modal {
            background: #4f6fdf;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.8rem;
        }

        button, .btn, .dot, .footer-btn {
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<div id="verifyOverlay" class="verify-overlay">
    <div class="verify-card">
        <i class="fas fa-shield-alt"></i>
        <h2>ভেরিফিকেশন প্রয়োজন</h2>
        <p>সাইটে প্রবেশ করতে অনুগ্রহ করে ভেরিফিকেশন সম্পন্ন করুন</p>
        <button id="verifyBtn" class="verify-btn">
            <i class="fas fa-check-circle"></i> ভেরিফাই করুন
        </button>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">
        <div class="slider-section">
            <div class="section-title">
                <i class="fas fa-film"></i> ট্রেন্ডিং ভিডিও
            </div>
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack"></div>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
            <p style="font-size:0.7rem; margin-top:10px; text-align:center; opacity:0.7;">
                <i class="fas fa-lock"></i> প্রতিটি বাটন আনলক করতে ২টি করে এড দেখুন (🔓 0/2)
            </p>
        </div>

        <div class="thumbnails-grid">
            <div class="grid-title"><i class="fas fa-th-large"></i> আপনার সংগ্রহ</div>
            <div class="grid-container" id="videoGridContainer"></div>
        </div>
    </div>

    <footer class="professional-footer">
        <div class="copyright"><i class="far fa-copyright"></i> ২০২৬ ভিডিও পোর্টাল</div>
        <div class="footer-buttons">
            <button class="footer-btn" id="privacyBtn"><i class="fas fa-shield-alt"></i> প্রাইভেসি</button>
            <button class="footer-btn" id="aboutBtn"><i class="fas fa-info-circle"></i> সম্পর্কে</button>
        </div>
    </footer>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">প্রাইভেসি ও পলিসি</h3>
            <div id="modalBody">
                <p>আমরা আপনার গোপনীয়তাকে সম্মান করি। প্রতিটি বাটন আলাদাভাবে আনলক করতে হবে।</p>
            </div>
            <button class="close-modal">বন্ধ করুন</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if(tg) {
        tg.expand();
        tg.ready();
    }
    
    const ADSGRAM_BLOCK_ID = "int-27313";
    const MONITEG_LINK = "https://omg10.com/4/9722284";
    const TARGET_DOMAIN = "https://t.me/final_hub_bot/app?startapp";
    
    let mainAdController = null;
    let verificationAdController = null;
    
    function initAdsgramController(blockId) {
        if (!window.Adsgram) return null;
        try {
            return window.Adsgram.init({ 
                blockId: blockId,
                debug: false,
                debugBannerType: "RewardedVideo"
            });
        } catch(e) {
            return null;
        }
    }
    
    let globalCooldown = false;
    let cooldownTimer = null;
    let cooldownEndTime = 0;
    
    function startCooldown(seconds = 5) {
        globalCooldown = true;
        cooldownEndTime = Date.now() + (seconds * 1000);
        if(cooldownTimer) clearInterval(cooldownTimer);
        cooldownTimer = setInterval(() => {
            if(Date.now() >= cooldownEndTime) {
                clearInterval(cooldownTimer);
                globalCooldown = false;
                cooldownTimer = null;
            }
        }, 1000);
    }
    
    function isInCooldown() {
        if(globalCooldown && Date.now() < cooldownEndTime) return true;
        globalCooldown = false;
        if(cooldownTimer) clearInterval(cooldownTimer);
        return false;
    }
    
    function showLoadingNotification(message) {
        const existing = document.querySelector('.loading-notification');
        if(existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'loading-notification';
        div.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message}`;
        document.body.appendChild(div);
        return div;
    }
    
    function hideLoadingNotification(notification) {
        if(notification && notification.remove) notification.remove();
        else { const existing = document.querySelector('.loading-notification'); if(existing) existing.remove(); }
    }
    
    function showNotification(message) {
        if(tg) tg.showAlert(message);
        else alert(message);
    }
    
    async function showMonitegWithTimer() {
        return new Promise((resolve) => {
            const monitegWindow = window.open(MONITEG_LINK, '_blank');
            let secondsLeft = 11;
            
            const timerDiv = document.createElement('div');
            timerDiv.className = 'timer-overlay';
            timerDiv.innerHTML = `<i class="fas fa-clock"></i> ${secondsLeft} সেকেন্ড বাকি...`;
            document.body.appendChild(timerDiv);
            
            const timerInterval = setInterval(() => {
                secondsLeft--;
                if(timerDiv) timerDiv.innerHTML = `<i class="fas fa-clock"></i> ${secondsLeft} সেকেন্ড বাকি...`;
                if(secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    if(timerDiv && timerDiv.parentNode) timerDiv.remove();
                    resolve(true);
                }
            }, 1000);
            
            const checkClosed = setInterval(() => {
                if(monitegWindow && monitegWindow.closed) {
                    clearInterval(checkClosed);
                    if(secondsLeft > 0) {
                        clearInterval(timerInterval);
                        if(timerDiv && timerDiv.parentNode) timerDiv.remove();
                        resolve(false);
                    }
                }
            }, 500);
        });
    }
    
    async function showAdsgramSecondAd(controller) {
        if (!controller) return false;
        if (isInCooldown()) return false;
        
        const loading = showLoadingNotification("এড লোড হচ্ছে...");
        try {
            const result = await controller.show();
            hideLoadingNotification(loading);
            if (result && result.done === true) {
                startCooldown(5);
                return true;
            }
            return false;
        } catch (error) {
            hideLoadingNotification(loading);
            return false;
        }
    }
    
    async function showFullUnlockSequence(adController) {
        if (isInCooldown()) return false;
        
        const monitegDone = await showMonitegWithTimer();
        if (!monitegDone) return false;
        
        await new Promise(r => setTimeout(r, 500));
        
        const adsDone = await showAdsgramSecondAd(adController);
        if (!adsDone) return false;
        
        return true;
    }
    
    let buttonStates = new Map();
    
    function getButtonState(videoId, buttonType) {
        const key = `${videoId}_${buttonType}`;
        if(!buttonStates.has(key)) {
            buttonStates.set(key, { current: 0, required: 2, unlocked: false });
        }
        return buttonStates.get(key);
    }
    
    function updateButtonUI(btnElement, state) {
        if(!btnElement) return;
        const counterSpan = btnElement.querySelector('.unlock-counter');
        if(counterSpan) {
            counterSpan.innerHTML = `🔓 ${state.current}/${state.required}`;
        }
        if(state.unlocked) {
            btnElement.classList.remove('locked');
            btnElement.classList.add('unlocked');
            btnElement.disabled = false;
        } else {
            btnElement.classList.remove('unlocked');
            btnElement.classList.add('locked');
            btnElement.disabled = false;
        }
    }
    
    async function incrementUnlockWithFullAds(videoId, buttonType, btnElement) {
        const state = getButtonState(videoId, buttonType);
        if(state.unlocked) return true;
        
        if (!mainAdController) {
            mainAdController = initAdsgramController(ADSGRAM_BLOCK_ID);
        }
        
        const success = await showFullUnlockSequence(mainAdController);
        
        if (success) {
            state.current++;
            updateButtonUI(btnElement, state);
            if (state.current >= state.required) {
                state.unlocked = true;
                updateButtonUI(btnElement, state);
                return true;
            }
            return false;
        }
        return false;
    }
    
    async function performActionWithUnlock(videoId, buttonType, btnElement, actionCallback) {
        const state = getButtonState(videoId, buttonType);
        if(state.unlocked) {
            actionCallback();
        } else {
            const unlockedNow = await incrementUnlockWithFullAds(videoId, buttonType, btnElement);
            if (unlockedNow) {
                actionCallback();
            }
        }
    }
    
    function handleDownload(link, videoId, btnElement) {
        performActionWithUnlock(videoId, 'download', btnElement, () => {
            window.open(TARGET_DOMAIN, '_blank');
        });
    }
    
    function handleWatch(videoUrl, videoId, btnElement) {
        performActionWithUnlock(videoId, 'watch', btnElement, () => {
            window.open(TARGET_DOMAIN, '_blank');
        });
    }
    
    function onPlayIconClick(videoUrl, videoId) {
        const state = getButtonState(videoId, 'watch');
        if(state.unlocked) {
            window.open(TARGET_DOMAIN, '_blank');
        }
    }
    
    const adLinks = [
        "https://omg10.com/4/9809281",
        "https://omg10.com/4/9722283",
        "https://omg10.com/4/9722284"
    ];
    
    const thumbnailLinks = [
        "https://i.ibb.co.com/k2RM9BDQ/1775025365581.jpg",
        "https://i.ibb.co.com/jP2Ht8Fr/1775025373666.jpg",
        "https://i.ibb.co.com/DfNDddF6/1775025414376.jpg",
        "https://i.ibb.co.com/RTSzsPBR/1775025485987.jpg",
        "https://i.ibb.co.com/99FQCvyr/IMG-20260409-223046.jpg"
    ];
    
    const videoItems = [
        { id:1, title:"প্রিমিয়াম ভিডিও ১", thumbUrl: thumbnailLinks[0], videoUrl: adLinks[0], downloadLink: adLinks[0] },
        { id:2, title:"প্রিমিয়াম ভিডিও ২", thumbUrl: thumbnailLinks[1], videoUrl: adLinks[1], downloadLink: adLinks[1] },
        { id:3, title:"প্রিমিয়াম ভিডিও ৩", thumbUrl: thumbnailLinks[2], videoUrl: adLinks[2], downloadLink: adLinks[2] },
        { id:4, title:"প্রিমিয়াম ভিডিও ৪", thumbUrl: thumbnailLinks[3], videoUrl: adLinks[0], downloadLink: adLinks[0] },
        { id:5, title:"প্রিমিয়াম ভিডিও ৫", thumbUrl: thumbnailLinks[4], videoUrl: adLinks[1], downloadLink: adLinks[1] },
        { id:6, title:"প্রিমিয়াম ভিডিও ৬", thumbUrl: thumbnailLinks[0], videoUrl: adLinks[2], downloadLink: adLinks[2] }
    ];
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    
    function createButtonHTML(item, buttonType, icon, label) {
        const state = getButtonState(item.id, buttonType);
        const btnClass = state.unlocked ? 'unlocked' : 'locked';
        const colorClass = buttonType === 'download' ? 'btn-download' : 'btn-watch';
        return `
            <button class="btn ${colorClass} ${btnClass}" data-video-id="${item.id}" data-btn-type="${buttonType}" data-link="${buttonType === 'download' ? item.downloadLink : item.videoUrl}">
                <i class="fas ${icon}"></i> ${label}
                <span class="unlock-counter">🔓 ${state.current}/${state.required}</span>
            </button>
        `;
    }
    
    function buildCarouselAndGrid() {
        const track = document.getElementById('carouselTrack');
        track.innerHTML = '';
        videoItems.forEach((item) => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `
                <div class="thumb-video-card">
                    <div class="thumb-wrapper" data-video-url="${item.videoUrl}" data-video-id="${item.id}">
                        <img class="thumb-img" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'">
                        <div class="play-overlay">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="video-title">${escapeHtml(item.title)}</div>
                        <div class="button-group">
                            ${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}
                            ${createButtonHTML(item, 'watch', 'fa-play', 'ওয়াচ নাও')}
                        </div>
                    </div>
                </div>
            `;
            track.appendChild(slide);
        });
        
        const gridContainer = document.getElementById('videoGridContainer');
        gridContainer.innerHTML = '';
        videoItems.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumb-wrapper" data-video-url="${item.videoUrl}" data-video-id="${item.id}">
                    <img class="thumb-img" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'">
                    <div class="play-overlay">
                        <i class="fas fa-play-circle"></i>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-title">${escapeHtml(item.title)}</div>
                    <div class="btn-group">
                        ${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}
                        ${createButtonHTML(item, 'watch', 'fa-eye', 'ওয়াচ নাও')}
                    </div>
                </div>
            `;
            gridContainer.appendChild(card);
        });
        
        attachEventListeners();
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.btn-download, .btn-watch').forEach(btn => {
            btn.removeEventListener('click', handleBtnClick);
            btn.addEventListener('click', handleBtnClick);
        });
        document.querySelectorAll('.thumb-wrapper').forEach(wrapper => {
            const videoUrl = wrapper.getAttribute('data-video-url');
            const videoId = parseInt(wrapper.getAttribute('data-video-id'));
            wrapper.removeEventListener('click', handlePlayClick);
            wrapper.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                onPlayIconClick(videoUrl, videoId);
            });
        });
    }
    
    function handleBtnClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const videoId = parseInt(btn.getAttribute('data-video-id'));
        const btnType = btn.getAttribute('data-btn-type');
        const link = btn.getAttribute('data-link');
        if(btnType === 'download') handleDownload(link, videoId, btn);
        else if(btnType === 'watch') handleWatch(link, videoId, btn);
    }
    
    function handlePlayClick(videoUrl, videoId, e) { onPlayIconClick(videoUrl, videoId); }
    
    let currentSlide = 0;
    let autoInterval;
    const totalSlides = videoItems.length;
    function buildDotsAndSlider() {
        const dotsDiv = document.getElementById('carouselDots');
        dotsDiv.innerHTML = '';
        for(let i=0; i<totalSlides; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if(i===currentSlide) dot.classList.add('active');
            dot.addEventListener('click', () => { goToSlide(i); resetAuto(); });
            dotsDiv.appendChild(dot);
        }
        goToSlide(0);
        startAuto();
    }
    function goToSlide(index) {
        if(index<0) index=0; if(index>=totalSlides) index=totalSlides-1;
        currentSlide = index;
        const track = document.getElementById('carouselTrack');
        track.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((dot,i)=>{ if(i===currentSlide) dot.classList.add('active'); else dot.classList.remove('active'); });
    }
    function nextSlide() { goToSlide((currentSlide+1)%totalSlides); }
    function startAuto() { if(autoInterval) clearInterval(autoInterval); autoInterval = setInterval(nextSlide, 4000); }
    function resetAuto() { if(autoInterval){clearInterval(autoInterval); startAuto();} }
    
    const modal = document.getElementById('infoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBodyDiv = document.getElementById('modalBody');
    function showPrivacy() { modalTitle.innerText = "প্রাইভেসি ও পলিসি"; modalBodyDiv.innerHTML = `<p>📜 প্রতিটি বাটন আনলক করতে ২টি করে এড দেখতে হবে।</p><p><i class="fas fa-lock"></i> কোন ডেটা সঞ্চয় করা হয় না।</p><p>⏱️ প্রতিটি এডের পর ৫ সেকেন্ড কুলডাউন সময় থাকবে।</p>`; modal.style.display = 'flex'; }
    function showAbout() { modalTitle.innerText = "আমাদের সম্পর্কে"; modalBodyDiv.innerHTML = `<p>🎬 মিনি অ্যাপ ভিডিও পোর্টাল - প্রতি বাটনে ২টি এড দেখে আনলক সিস্টেম।</p><p>⚠️ এড সম্পূর্ণ না দেখলে কাউন্ট বাড়বে না!</p>`; modal.style.display = 'flex'; }
    document.getElementById('privacyBtn').addEventListener('click', showPrivacy);
    document.getElementById('aboutBtn').addEventListener('click', showAbout);
    document.querySelector('.close-modal').addEventListener('click', () => { modal.style.display = 'none'; });
    window.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });
    
    async function handleVerification() {
        const verifyBtn = document.getElementById('verifyBtn');
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> লোডিং...';
        if (!verificationAdController) verificationAdController = initAdsgramController(ADSGRAM_BLOCK_ID);
        if (!verificationAdController) {
            verifyBtn.disabled = false; verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ভেরিফাই করুন';
            return;
        }
        const success = await showAdsgramSecondAd(verificationAdController);
        if(success) {
            const overlay = document.getElementById('verifyOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; document.getElementById('mainContent').classList.add('visible'); }, 300);
        } else {
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ভেরিফাই করুন';
        }
    }
    document.getElementById('verifyBtn').addEventListener('click', handleVerification);
    
    function waitForAdsgram() {
        return new Promise((resolve) => {
            if(window.Adsgram) resolve(true);
            else { let itv = setInterval(()=>{ if(window.Adsgram){ clearInterval(itv); resolve(true); } },200); setTimeout(()=>{ clearInterval(itv); resolve(false); },5000); }
        });
    }
    
    function init() {
        buildCarouselAndGrid();
        buildDotsAndSlider();
        const caro = document.querySelector('.carousel-container');
        if(caro) { caro.addEventListener('mouseenter', () => { if(autoInterval) clearInterval(autoInterval); }); caro.addEventListener('mouseleave', startAuto); }
        waitForAdsgram();
    }
    init();
</script>
</body>
</html>
