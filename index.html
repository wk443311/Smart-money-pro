<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ভিডিও পোর্টাল - টেলিগ্রাম মিনি অ্যাপ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- টেলিগ্রাম ওয়েব অ্যাপ SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- ======================= এডসগ্রাম SDK (সঠিক লিংক) ======================= -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            padding: 1rem;
            color: #f0f3fa;
            min-height: 100vh;
        }

        /* ভেরিফাই ওভারলে - সম্পূর্ণ পেজ কভার করবে */
        .verify-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .verify-card {
            background: linear-gradient(145deg, #11161f, #0c1120);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 1px solid #ff6a3d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .verify-card i {
            font-size: 4rem;
            color: #ff6a3d;
            margin-bottom: 1rem;
        }

        .verify-card h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #ffaa66;
        }

        .verify-card p {
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        .verify-btn {
            background: #ff6a3d;
            border: none;
            padding: 1rem 2rem;
            border-radius: 3rem;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(255,106,61,0.3);
        }

        .verify-btn:hover {
            transform: scale(1.02);
            background: #ff8555;
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* মূল কন্টেন্ট - প্রাথমিকভাবে hidden */
        .main-content {
            display: none;
        }

        .main-content.visible {
            display: block;
        }

        /* কুলডাউন টাইমার স্টাইল */
        .cooldown-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6a3d;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* লোডিং নোটিফিকেশন */
        .loading-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            z-index: 1002;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ff6a3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;
        }

        .loading-notification i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ff6a3d;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .slider-section {
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.5rem;
            padding: 1rem 0.75rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 5px solid #ff6a3d;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: #ff6a3d;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 1.2rem;
            background: #00000055;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-slide {
            flex: 0 0 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }

        .thumb-video-card {
            background: #11161f;
            border-radius: 1.2rem;
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .thumb-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #0a0e16;
            cursor: pointer;
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .play-overlay i {
            font-size: 3.5rem;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        .play-overlay:hover i {
            transform: scale(1.1);
            color: #ff6a3d;
        }

        .thumb-wrapper:hover .thumb-img {
            transform: scale(1.02);
        }

        .card-info {
            padding: 1rem;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            word-break: break-word;
            line-height: 1.4;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 0.6rem 0.5rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: #2c3e66;
            color: white;
            border: 1px solid #3e5a8f;
        }

        .btn-watch {
            background: #ff6a3d;
            color: white;
            border: none;
        }

        .unlock-counter {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        .btn.locked {
            background: #4a4f5e;
            opacity: 0.8;
        }

        .btn.unlocked {
            background: #2ecc71;
            opacity: 1;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .dot {
            width: 30px;
            height: 4px;
            background: #4b5563;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .dot.active {
            background: #ff6a3d;
            width: 40px;
        }

        .thumbnails-grid {
            margin-top: 1.5rem;
        }

        .grid-title {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
            border-left: 5px solid #ff6a3d;
            padding-left: 1rem;
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .video-card {
            background: #11161fe6;
            border-radius: 1.2rem;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .card-body {
            padding: 0.9rem 1rem 1rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        .professional-footer {
            margin-top: 2.5rem;
            background: #0c1120cc;
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            border-top: 1px solid #2a334a;
        }

        .copyright {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .footer-buttons {
            display: flex;
            gap: 0.8rem;
        }

        .footer-btn {
            background: none;
            border: none;
            color: #ffb347;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            padding: 0.3rem 0.6rem;
            border-radius: 1.5rem;
        }

        .footer-btn:hover {
            background: #ff6a3d20;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: #12172ae6;
            max-width: 400px;
            width: 100%;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid #ffaa55;
            color: #f0f3fa;
        }

        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ffaa66;
        }

        .modal-content p {
            line-height: 1.5;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .close-modal {
            background: #ff6a3d;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.8rem;
        }

        button, .btn, .dot, .footer-btn {
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<!-- ভেরিফাই ওভারলে -->
<div id="verifyOverlay" class="verify-overlay">
    <div class="verify-card">
        <i class="fas fa-shield-alt"></i>
        <h2>ভেরিফিকেশন প্রয়োজন</h2>
        <p>সাইটে প্রবেশ করতে অনুগ্রহ করে ভেরিফিকেশন সম্পন্ন করুন</p>
        <button id="verifyBtn" class="verify-btn">
            <i class="fas fa-check-circle"></i> ভেরিফাই করুন
        </button>
    </div>
</div>

<!-- মূল কন্টেন্ট -->
<div id="mainContent" class="main-content">
    <div class="container">
        <div class="slider-section">
            <div class="section-title">
                <i class="fas fa-film"></i> ট্রেন্ডিং ভিডিও
            </div>
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack"></div>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
            <p style="font-size:0.7rem; margin-top:10px; text-align:center; opacity:0.7;">
                <i class="fas fa-lock"></i> প্রতিটি বাটন আনলক করতে ২টি করে এড দেখুন (🔓 0/2)
            </p>
        </div>

        <div class="thumbnails-grid">
            <div class="grid-title"><i class="fas fa-th-large"></i> আপনার সংগ্রহ</div>
            <div class="grid-container" id="videoGridContainer"></div>
        </div>
    </div>

    <footer class="professional-footer">
        <div class="copyright"><i class="far fa-copyright"></i> ২০২৬ ভিডিও পোর্টাল</div>
        <div class="footer-buttons">
            <button class="footer-btn" id="privacyBtn"><i class="fas fa-shield-alt"></i> প্রাইভেসি</button>
            <button class="footer-btn" id="aboutBtn"><i class="fas fa-info-circle"></i> সম্পর্কে</button>
        </div>
    </footer>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">প্রাইভেসি ও পলিসি</h3>
            <div id="modalBody">
                <p>আমরা আপনার গোপনীয়তাকে সম্মান করি। প্রতিটি বাটন আলাদাভাবে আনলক করতে হবে।</p>
            </div>
            <button class="close-modal">বন্ধ করুন</button>
        </div>
    </div>
</div>

<script>
    // ======================= টেলিগ্রাম মিনি অ্যাপ =======================
    let tg = window.Telegram?.WebApp;
    if(tg) {
        tg.expand();
        tg.ready();
        console.log("টেলিগ্রাম মিনি অ্যাপ রেডি");
    }
    
    // ======================= এডসগ্রাম কনফিগারেশন =======================
    // আপনার একাউন্ট থেকে পাওয়া আসল blockId এখানে বসান
    // debug: true থাকলে টেস্ট এড দেখাবে, প্রোডাকশনে false করে দিবেন
    const ADSGRAM_BLOCK_ID = "int-27313";  // ⚠️ এখানে আপনার আসল blockId বসান
    
    // AdController গ্লোবালি সংরক্ষণ
    let mainAdController = null;
    let verificationAdController = null;
    
    // এডসগ্রাম ইনিশিয়ালাইজেশন ফাংশন - সঠিক পদ্ধতি [citation:3][citation:5]
    function initAdsgramController(blockId, isVerification = false) {
        if (!window.Adsgram) {
            console.error("Adsgram SDK লোড হয়নি!");
            return null;
        }
        
        try {
            // সঠিক পদ্ধতি: window.Adsgram.init() [citation:3]
            const controller = window.Adsgram.init({ 
                blockId: blockId,
                debug: false,  // টেস্টিং এর জন্য true রাখুন, প্রোডাকশনে false করে দিবেন
                debugBannerType: "RewardedVideo"  // রিওয়ার্ডেড ভিডিও ফরম্যাট
            });
            console.log(`${isVerification ? 'ভেরিফিকেশন' : 'মেইন'} AdController তৈরি হয়েছে`);
            return controller;
        } catch(e) {
            console.error("Adsgram init error:", e);
            return null;
        }
    }
    
    // এড দেখানোর ফাংশন - সঠিক Promise পদ্ধতি [citation:6][citation:7]
    async function showAd(controller, onSuccess, onError) {
        if (!controller) {
            console.error("AdController নেই!");
            if(onError) onError("AdController not initialized");
            return false;
        }
        
        // কুলডাউন চেক
        if (isInCooldown()) {
            showNotification("⏳ দয়া করে কিছুক্ষণ অপেক্ষা করুন! আগের বিজ্ঞাপনের পর ১৫ সেকেন্ড কুলডাউন চলছে।", false);
            if(onError) onError("Cooldown active");
            return false;
        }
        
        const loadingNotif = showLoadingNotification("এড লোড হচ্ছে...");
        
        try {
            // সঠিক পদ্ধতি: controller.show() যা Promise রিটার্ন করে [citation:5][citation:6]
            const result = await controller.show();
            console.log("Ad show result:", result);
            
            hideLoadingNotification(loadingNotif);
            
            // done true মানে ইউজার সম্পূর্ণ এড দেখেছে [citation:3]
            if (result && result.done === true) {
                startCooldown();
                if(onSuccess) onSuccess();
                return true;
            } else {
                // এড স্কিপ করা হয়েছে বা সম্পূর্ণ হয়নি
                showNotification("⚠️ দয়া করে সম্পূর্ণ এড দেখুন! স্কিপ করবেন না।", false);
                if(onError) onError("Ad not completed");
                return false;
            }
        } catch (error) {
            console.error("Ad show error:", error);
            hideLoadingNotification(loadingNotif);
            showNotification("❌ বিজ্ঞাপন লোড করতে সমস্যা হয়েছে! দয়া করে আবার চেষ্টা করুন।", false);
            if(onError) onError(error);
            return false;
        }
    }
    
    // লোডিং নোটিফিকেশন
    function showLoadingNotification(message = "এড লোড হচ্ছে...") {
        const existing = document.querySelector('.loading-notification');
        if(existing) existing.remove();
        
        const div = document.createElement('div');
        div.className = 'loading-notification';
        div.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message}<br><span style="font-size:0.8rem;">দয়া করে অপেক্ষা করুন</span>`;
        document.body.appendChild(div);
        
        return div;
    }
    
    function hideLoadingNotification(notification) {
        if(notification && notification.remove) {
            notification.remove();
        } else {
            const existing = document.querySelector('.loading-notification');
            if(existing) existing.remove();
        }
    }
    
    function showNotification(message, isSuccess = true) {
        if(tg) {
            tg.showAlert(message);
        } else {
            alert(message);
        }
    }
    
    // ======================= কুলডাউন ম্যানেজমেন্ট =======================
    let globalCooldown = false;
    let cooldownTimer = null;
    let cooldownEndTime = 0;
    
    function showCooldownMessage(secondsLeft) {
        const existingMsg = document.querySelector('.cooldown-overlay');
        if(existingMsg) existingMsg.remove();
        
        const div = document.createElement('div');
        div.className = 'cooldown-overlay';
        div.innerHTML = `<i class="fas fa-hourglass-half"></i> দয়া করে ${secondsLeft} সেকেন্ড অপেক্ষা করুন...`;
        document.body.appendChild(div);
        
        setTimeout(() => {
            if(div.parentNode) div.remove();
        }, 3000);
    }
    
    function startCooldown() {
        globalCooldown = true;
        cooldownEndTime = Date.now() + 15000;
        
        if(cooldownTimer) clearInterval(cooldownTimer);
        
        cooldownTimer = setInterval(() => {
            const remaining = Math.ceil((cooldownEndTime - Date.now()) / 1000);
            if(remaining <= 0) {
                clearInterval(cooldownTimer);
                globalCooldown = false;
                cooldownTimer = null;
                if(tg) {
                    tg.showAlert("✅ কুলডাউন শেষ! আপনি এখন পরবর্তী বিজ্ঞাপন দেখতে পারেন।");
                }
                const msgDiv = document.querySelector('.cooldown-overlay');
                if(msgDiv) msgDiv.remove();
            }
        }, 1000);
    }
    
    function isInCooldown() {
        if(globalCooldown) {
            const remaining = Math.ceil((cooldownEndTime - Date.now()) / 1000);
            if(remaining > 0) {
                showCooldownMessage(remaining);
                return true;
            } else {
                globalCooldown = false;
                if(cooldownTimer) clearInterval(cooldownTimer);
                return false;
            }
        }
        return false;
    }
    
    // ======================= ভেরিফিকেশন ফাংশন =======================
    async function handleVerification() {
        const verifyBtn = document.getElementById('verifyBtn');
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> লোডিং...';
        
        // ভেরিফিকেশনের জন্য এড কন্ট্রোলার ইনিশিয়ালাইজ করুন
        if (!verificationAdController) {
            verificationAdController = initAdsgramController(ADSGRAM_BLOCK_ID, true);
        }
        
        if (!verificationAdController) {
            showNotification("❌ বিজ্ঞাপন সিস্টেম初始化 হয়নি! দয়া করে আবার চেষ্টা করুন।", false);
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ভেরিফাই করুন';
            return;
        }
        
        const success = await showAd(
            verificationAdController,
            () => {
                // এড সফলভাবে দেখার পর
                showNotification("✅ সম্পূর্ণ এড দেখে সাইটে প্রবেশ করুন! সাইটে স্বাগতম।", true);
                
                // ভেরিফাই ওভারলে সরান এবং কন্টেন্ট দেখান
                const overlay = document.getElementById('verifyOverlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('mainContent').classList.add('visible');
                }, 300);
            },
            (error) => {
                // এড দেখাতে সমস্যা হলে
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ভেরিফাই করুন';
            }
        );
        
        if (!success) {
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ভেরিফাই করুন';
        }
    }
    
    // ======================= ভিডিও ডাটা =======================
    const adLinks = [
        "https://omg10.com/4/9809281",
        "https://omg10.com/4/9722283",
        "https://omg10.com/4/9722284"
    ];
    
    const thumbnailLinks = [
        "https://i.ibb.co.com/k2RM9BDQ/1775025365581.jpg",
        "https://i.ibb.co.com/jP2Ht8Fr/1775025373666.jpg",
        "https://i.ibb.co.com/DfNDddF6/1775025414376.jpg",
        "https://i.ibb.co.com/RTSzsPBR/1775025485987.jpg",
        "https://i.ibb.co.com/99FQCvyr/IMG-20260409-223046.jpg"
    ];
    
    const videoItems = [
        { id:1, title:"প্রিমিয়াম ভিডিও ১", thumbUrl: thumbnailLinks[0], videoUrl: adLinks[0], downloadLink: adLinks[0] },
        { id:2, title:"প্রিমিয়াম ভিডিও ২", thumbUrl: thumbnailLinks[1], videoUrl: adLinks[1], downloadLink: adLinks[1] },
        { id:3, title:"প্রিমিয়াম ভিডিও ৩", thumbUrl: thumbnailLinks[2], videoUrl: adLinks[2], downloadLink: adLinks[2] },
        { id:4, title:"প্রিমিয়াম ভিডিও ৪", thumbUrl: thumbnailLinks[3], videoUrl: adLinks[0], downloadLink: adLinks[0] },
        { id:5, title:"প্রিমিয়াম ভিডিও ৫", thumbUrl: thumbnailLinks[4], videoUrl: adLinks[1], downloadLink: adLinks[1] },
        { id:6, title:"প্রিমিয়াম ভিডিও ৬", thumbUrl: thumbnailLinks[0], videoUrl: adLinks[2], downloadLink: adLinks[2] }
    ];
    
    // বাটন আনলক স্টেট
    let buttonStates = new Map();
    
    function getButtonState(videoId, buttonType) {
        const key = `${videoId}_${buttonType}`;
        if(!buttonStates.has(key)) {
            buttonStates.set(key, { current: 0, required: 2, unlocked: false });
        }
        return buttonStates.get(key);
    }
    
    function updateButtonUI(btnElement, state) {
        if(!btnElement) return;
        const counterSpan = btnElement.querySelector('.unlock-counter');
        if(counterSpan) {
            counterSpan.innerHTML = `🔓 ${state.current}/${state.required}`;
        }
        
        if(state.unlocked) {
            btnElement.classList.remove('locked');
            btnElement.classList.add('unlocked');
            btnElement.disabled = false;
        } else {
            btnElement.classList.remove('unlocked');
            btnElement.classList.add('locked');
            btnElement.disabled = false;
        }
    }
    
    function incrementAndCheck(videoId, buttonType, btnElement) {
        const state = getButtonState(videoId, buttonType);
        if(state.unlocked) return true;
        
        state.current++;
        updateButtonUI(btnElement, state);
        
        if(state.current >= state.required) {
            state.unlocked = true;
            updateButtonUI(btnElement, state);
            showNotification(`✅ বাটনটি সম্পূর্ণ আনলক হয়েছে! এখন ব্যবহার করতে পারবেন।`, true);
            return true;
        } else {
            showNotification(`📢 ${state.current}/${state.required} টি এড সম্পন্ন হয়েছে। আরও ${state.required - state.current} টি এড দেখুন।`, true);
            return false;
        }
    }
    
    // বাটন আনলকের জন্য এড দেখানোর ফাংশন
    async function showAdForUnlock(videoId, buttonType, btnElement, onComplete) {
        if (!mainAdController) {
            mainAdController = initAdsgramController(ADSGRAM_BLOCK_ID, false);
        }
        
        if (!mainAdController) {
            showNotification("❌ বিজ্ঞাপন সিস্টেম প্রস্তুত নয়!", false);
            return false;
        }
        
        const success = await showAd(
            mainAdController,
            () => {
                const isUnlocked = incrementAndCheck(videoId, buttonType, btnElement);
                if (onComplete) onComplete(isUnlocked);
            },
            () => {
                if (onComplete) onComplete(false);
            }
        );
        
        return success;
    }
    
    function performAction(videoId, buttonType, btnElement, actionCallback) {
        const state = getButtonState(videoId, buttonType);
        
        if(state.unlocked) {
            actionCallback();
        } else {
            showAdForUnlock(videoId, buttonType, btnElement, (isUnlocked) => {
                if(isUnlocked) {
                    actionCallback();
                }
            });
        }
    }
    
    function handleDownload(link, videoId, btnElement) {
        performAction(videoId, 'download', btnElement, () => {
            if(link) {
                window.open(link, '_blank');
                showNotification("🔗 লিংকে রিডাইরেক্ট করা হচ্ছে...", true);
            } else {
                showNotification("লিংক নেই!", false);
            }
        });
    }
    
    function handleWatch(videoUrl, videoId, btnElement) {
        performAction(videoId, 'watch', btnElement, () => {
            if(videoUrl) {
                window.open(videoUrl, '_blank');
                showNotification("🔗 লিংকে রিডাইরেক্ট করা হচ্ছে...", true);
            } else {
                showNotification("লিংক নেই", false);
            }
        });
    }
    
    function onPlayIconClick(videoUrl, videoId) {
        const state = getButtonState(videoId, 'watch');
        if(state.unlocked) {
            if(videoUrl) window.open(videoUrl, '_blank');
        } else {
            showNotification("⚠️ দয়া করে প্রথমে 'ওয়াচ নাও' বাটনটি আনলক করুন!", false);
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }
    
    function createButtonHTML(item, buttonType, icon, label) {
        const state = getButtonState(item.id, buttonType);
        const btnClass = state.unlocked ? 'unlocked' : 'locked';
        const colorClass = buttonType === 'download' ? 'btn-download' : 'btn-watch';
        
        return `
            <button class="btn ${colorClass} ${btnClass}" data-video-id="${item.id}" data-btn-type="${buttonType}" data-link="${buttonType === 'download' ? item.downloadLink : item.videoUrl}">
                <i class="fas ${icon}"></i> ${label}
                <span class="unlock-counter">🔓 ${state.current}/${state.required}</span>
            </button>
        `;
    }
    
    function buildCarouselAndGrid() {
        const track = document.getElementById('carouselTrack');
        track.innerHTML = '';
        videoItems.forEach((item) => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `
                <div class="thumb-video-card">
                    <div class="thumb-wrapper" data-video-url="${item.videoUrl}" data-video-id="${item.id}">
                        <img class="thumb-img" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'">
                        <div class="play-overlay">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="video-title">${escapeHtml(item.title)}</div>
                        <div class="button-group">
                            ${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}
                            ${createButtonHTML(item, 'watch', 'fa-play', 'ওয়াচ নাও')}
                        </div>
                    </div>
                </div>
            `;
            track.appendChild(slide);
        });
        
        const gridContainer = document.getElementById('videoGridContainer');
        gridContainer.innerHTML = '';
        videoItems.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumb-wrapper" data-video-url="${item.videoUrl}" data-video-id="${item.id}">
                    <img class="thumb-img" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'">
                    <div class="play-overlay">
                        <i class="fas fa-play-circle"></i>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-title">${escapeHtml(item.title)}</div>
                    <div class="btn-group">
                        ${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}
                        ${createButtonHTML(item, 'watch', 'fa-eye', 'ওয়াচ নাও')}
                    </div>
                </div>
            `;
            gridContainer.appendChild(card);
        });
        
        attachEventListeners();
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.btn-download, .btn-watch').forEach(btn => {
            btn.removeEventListener('click', handleBtnClick);
            btn.addEventListener('click', handleBtnClick);
        });
        
        document.querySelectorAll('.thumb-wrapper').forEach(wrapper => {
            const videoUrl = wrapper.getAttribute('data-video-url');
            const videoId = parseInt(wrapper.getAttribute('data-video-id'));
            wrapper.removeEventListener('click', handlePlayClick);
            wrapper.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                onPlayIconClick(videoUrl, videoId);
            });
        });
    }
    
    function handleBtnClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const videoId = parseInt(btn.getAttribute('data-video-id'));
        const btnType = btn.getAttribute('data-btn-type');
        const link = btn.getAttribute('data-link');
        
        if(btnType === 'download') {
            handleDownload(link, videoId, btn);
        } else if(btnType === 'watch') {
            handleWatch(link, videoId, btn);
        }
    }
    
    function handlePlayClick(videoUrl, videoId, e) {
        onPlayIconClick(videoUrl, videoId);
    }
    
    // স্লাইডার
    let currentSlide = 0;
    let autoInterval;
    const totalSlides = videoItems.length;
    
    function buildDotsAndSlider() {
        const dotsDiv = document.getElementById('carouselDots');
        dotsDiv.innerHTML = '';
        for(let i=0; i<totalSlides; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if(i===currentSlide) dot.classList.add('active');
            dot.addEventListener('click', () => {
                goToSlide(i);
                resetAuto();
            });
            dotsDiv.appendChild(dot);
        }
        goToSlide(0);
        startAuto();
    }
    
    function goToSlide(index) {
        if(index<0) index=0;
        if(index>=totalSlides) index=totalSlides-1;
        currentSlide = index;
        const track = document.getElementById('carouselTrack');
        track.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((dot,i)=>{
            if(i===currentSlide) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }
    
    function nextSlide() { goToSlide((currentSlide+1)%totalSlides); }
    function startAuto() { if(autoInterval) clearInterval(autoInterval); autoInterval = setInterval(nextSlide, 4000); }
    function resetAuto() { if(autoInterval){clearInterval(autoInterval); startAuto();} }
    
    // মডাল
    const modal = document.getElementById('infoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBodyDiv = document.getElementById('modalBody');
    
    function showPrivacy() {
        modalTitle.innerText = "গোপনীয়তা ও পলিসি";
        modalBodyDiv.innerHTML = `<p>📜 প্রতিটি বাটন আনলক করতে ২টি করে এড দেখতে হবে।</p><p><i class="fas fa-lock"></i> কোন ডেটা সঞ্চয় করা হয় না।</p><p>⏱️ প্রতিটি এডের পর ১৫ সেকেন্ড কুলডাউন সময় থাকবে।</p>`;
        modal.style.display = 'flex';
    }
    
    function showAbout() {
        modalTitle.innerText = "আমাদের সম্পর্কে";
        modalBodyDiv.innerHTML = `<p>🎬 মিনি অ্যাপ ভিডিও পোর্টাল - প্রতি বাটনে ২টি এড দেখে আনলক সিস্টেম।</p><p>⚠️ এড সম্পূর্ণ না দেখলে কাউন্ট বাড়বে না!</p>`;
        modal.style.display = 'flex';
    }
    
    // ভেরিফাই বাটনে ক্লিক ইভেন্ট
    document.getElementById('verifyBtn').addEventListener('click', handleVerification);
    
    document.getElementById('privacyBtn').addEventListener('click', showPrivacy);
    document.getElementById('aboutBtn').addEventListener('click', showAbout);
    document.querySelector('.close-modal').addEventListener('click', () => {
        modal.style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if(e.target === modal) modal.style.display = 'none';
    });
    
    // এডসগ্রাম SDK লোড হয়েছে কিনা চেক করুন
    function waitForAdsgram() {
        return new Promise((resolve) => {
            if(window.Adsgram) {
                console.log("Adsgram SDK লোড হয়েছে!");
                resolve(true);
                return;
            }
            
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if(window.Adsgram) {
                    clearInterval(interval);
                    console.log("Adsgram SDK লোড হয়েছে!");
                    resolve(true);
                } else if(attempts > 50) {
                    clearInterval(interval);
                    console.error("Adsgram SDK লোড হয়নি!");
                    resolve(false);
                }
            }, 200);
        });
    }
    
    function init() {
        buildCarouselAndGrid();
        buildDotsAndSlider();
        const caro = document.querySelector('.carousel-container');
        if(caro) {
            caro.addEventListener('mouseenter', () => { if(autoInterval) clearInterval(autoInterval); });
            caro.addEventListener('mouseleave', startAuto);
        }
        
        // এডসগ্রাম রেডি হওয়ার অপেক্ষা
        waitForAdsgram().then((loaded) => {
            if(loaded && window.Adsgram) {
                console.log("✅ এডসগ্রাম প্রস্তুত!");
                // কন্ট্রোলার পরে প্রয়োজনে initialize হবে
            } else {
                console.warn("⚠️ এডসগ্রাম লোড হয়নি! চেক করুন ইন্টারনেট কানেকশন।");
                showNotification("⚠️ বিজ্ঞাপন সিস্টেম লোড হয়নি! দয়া করে পেজ রিফ্রেশ করুন।", false);
            }
        });
    }
    
    init();
</script>
